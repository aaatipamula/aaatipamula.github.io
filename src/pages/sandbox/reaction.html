    <div class="button-container">
      <button onclick="toggleOverlay('initial-overlay', 5)">Play 5</button>

    </div>

<script>
  const scoreCount = document.getElementById("score-count");
  const gridContainer = document.getElementById("grid-container");
  const pastScores = document.getElementById("past-scores");
  const finalModal = document.getElementById("final-modal-overlay");
  const finalScore = document.getElementById("final-score");

  let MAX_CLICKS = 5;
  let lastClick = Date.now();
  let scoreHistory = JSON.parse(localStorage.getItem(`scoreHistory-${MAX_CLICKS}`)) || [];

  let currentScore = 0;
  let currentIndex = 0;

  /**
   * Pick a random box to highlight.
   */
  function pickRandomBox() {
    currentIndex = Math.floor(Math.random() * 58);
    const itemStringId = `item${currentIndex}`;
    const item = document.getElementById(itemStringId);
    item.style.backgroundColor = "white";

    return new Promise(resolve => {
      const handler = event => {
        if (event.target.id === itemStringId) {
          window.removeEventListener("mousedown", handler);
          item.style.backgroundColor = "";
          resolve(event);
          lastClick = Date.now()
        }
      }
      window.addEventListener("mousedown", handler)
    });
  }

  /**
   * Update the score by some arbitrary amount and update the scoring card.
   */
  function updateScore(amount) {
    currentScore += amount;
    scoreCount.innerText = currentScore.toFixed(4);
  }

  /**
   * Update scoring history and the scoring history display.
   */
  function setScoreHistory() {
    scoreHistory.unshift(currentScore);
    scoreHistory.sort((a, b) => b - a);
    localStorage.setItem(`scoreHistory-${MAX_CLICKS}`, JSON.stringify(scoreHistory));

    pastScores.innerHTML = "";
    for (const score of scoreHistory) {
      const elem = document.createElement("div");
      elem.innerText = score.toFixed(4);
      if (currentScore === score) {
        elem.classList.add("green");
      }
      pastScores.appendChild(elem);
    }
  }

  /**
   * Reset the score history to nothing
   */
  function resetHistory() {
    scoreHistory = [];
    setScoreHistory();
  }

  /**
   * Reset the score/counters, update score history, and display results
   */
  async function mainLoop() {
    currentScore = 0;
    currentIndex = 0;
    lastClick = Date.now();
    updateScore(0);

    for (let i = 0; i < MAX_CLICKS; i++) {
      await pickRandomBox()
    }

    setScoreHistory();

    finalScore.innerText = currentScore.toFixed(4);
    finalModal.classList.toggle("active-overlay");
  }

  /**
   * Toggle overlay modals and start the game
   *
   * @param { string } id
   */
  async function toggleOverlay(id, maxClicks) {
    MAX_CLICKS = maxClicks || MAX_CLICKS;
    const elem = document.getElementById(id);
    elem.classList.toggle("active-overlay");
    await mainLoop();
  }


  /**
   * Add a click event listener to count the score
   *
   * Uses a quartic curve to add points (-10x^4+10)
   *   and constant -5 for misclicks
   */
  for (let i = 0; i < gridContainer.childElementCount; i++) {
    const item = gridContainer.children[i];
    item.addEventListener("mousedown", () => {
      const clickTimeSec = (Date.now() - lastClick) * 0.001
      if (i === currentIndex) {
        updateScore(-10 * Math.pow(clickTimeSec, 4) + 10);
      } else {
        updateScore(-5);
      }
    });
  }
</script>
